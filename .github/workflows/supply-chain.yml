name: Supply Chain Security

# Supply chain integrity checks: SBOM generation and deep CVE analysis.
#
#  • SBOM (CycloneDX) — machine-readable software bill of materials for every
#    commit to main; attached to releases. Enables downstream consumers to
#    audit transitive dependencies and perform their own vulnerability triage.
#
#  • OWASP Dependency Check — full NVD CVE scan of all direct and transitive
#    Maven dependencies. Heavier than Trivy (downloads the NVD database); runs
#    weekly and on push to main. The plugin (config in the root pom) keeps its
#    NVD data set in /tmp/owasp, which is cached between runs. The NVD_API_KEY
#    organization secret lifts the anonymous rate-limit throttle
#    (https://nvd.nist.gov/developers/request-an-api-key).
#
# Both jobs upload SARIF to the Security > Code scanning tab.

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 4 * * 1' # weekly Monday 04:00 UTC

permissions:
  contents: read
  security-events: write

jobs:
  sbom:
    name: SBOM (CycloneDX)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 25
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: '25'
          distribution: temurin
          cache: maven

      - name: Generate aggregate SBOM
        # Produces a CycloneDX BOM covering all modules and their transitive
        # dependencies. Output: target/bom.json (CycloneDX JSON schema v1.4).
        run: >
          mvn -B -ntp -DskipTests
          org.cyclonedx:cyclonedx-maven-plugin:2.9.1:makeAggregateBom

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-${{ github.sha }}
          path: target/bom.json
          retention-days: 90

  owasp-dc:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 25
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: '25'
          distribution: temurin
          cache: maven

      - name: Cache NVD database
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /tmp/owasp
          key: nvd-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            nvd-${{ runner.os }}-

      - name: OWASP Dependency Check
        # The scan lives in the on-demand `owasp` profile; its configuration
        # (data directory, SARIF output, CVSS gate) is in the root pom. CI only
        # activates the profile and supplies the NVD API key from the
        # organization secret to lift the anonymous rate limit. Fails only on
        # CVSS 10; advisory findings surface via the uploaded SARIF.
        run: >
          mvn -B -ntp -Powasp dependency-check:check
          -DskipTests
          -Dnvd.api.key=${{ secrets.NVD_API_KEY }}
        continue-on-error: true

      - name: Upload OWASP DC SARIF
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        if: always()
        with:
          sarif_file: target/dependency-check-report.sarif
          category: owasp-dependency-check
        continue-on-error: true
