name: Release

# Triggered by the project maintainer pushing a semantic version tag.
# Tags follow the pattern vMAJOR.MINOR.PATCH (e.g. v0.1.0).
#
# The workflow:
#   1. Strips the 'v' prefix to derive the Maven release version.
#   2. Builds the full reactor with the release profile (sources, Javadoc, GPG sign).
#   3. Publishes all library modules to Maven Central via the Sonatype Central Portal.
#   4. Creates a GitHub Release with auto-generated notes and attaches the server JAR.
#
# Required repository secrets:
#   GPG_PRIVATE_KEY  — armoured private key (gpg --armor --export-secret-keys <id>)
#   GPG_PASSPHRASE   — passphrase protecting the private key
#   CENTRAL_TOKEN    — deployment token from central.sonatype.com

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write  # create GitHub Release and upload assets

jobs:
  release:
    name: Publish v${{ github.ref_name }}
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0  # full history for release notes generation

      - name: Set up JDK 25
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_TOKEN
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Derive release version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set Maven version
        run: |
          mvn -B versions:set \
            -DnewVersion=${{ steps.version.outputs.VERSION }} \
            -DgenerateBackupPoms=false

      - name: Build, sign, and verify
        run: mvn -B -P release verify
        env:
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Publish to Maven Central
        run: mvn -B -P release deploy -DskipTests
        env:
          CENTRAL_USERNAME: token
          CENTRAL_TOKEN: ${{ secrets.CENTRAL_TOKEN }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf831 # v2.2.2
        with:
          generate_release_notes: true
          files: tessera-server/target/tessera-server-${{ steps.version.outputs.VERSION }}.jar
          fail_on_unmatched_files: false
