# iam-persistence test configuration.
#
# Build-time settings for the @QuarkusTest row-level-security integration tests.
# Connection coordinates (reactive.url, jdbc.url, username, password) are injected at
# runtime by PostgresIamTestResource from the Testcontainers PostgreSQL.
#
# Only db/migration is on the Flyway location list here — the %dev-only db/dev-seed
# is deliberately excluded so the IT runs against an empty signing_key table and
# proves fail-closed isolation with its own tenants.

quarkus.devservices.enabled=false

# Reactive client for runtime; schema + RLS owned by Flyway, not Hibernate.
quarkus.datasource.db-kind=postgresql
quarkus.hibernate-orm.database.generation=none
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration
