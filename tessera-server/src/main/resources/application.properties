# IAM service — Quarkus runtime configuration.
# Keep this file PRAGMATIC: only properties needed to boot.

# Application identity
quarkus.application.name=tessera

# HTTP
quarkus.http.port=8090

# Virtual threads (structured concurrency, @RunOnVirtualThread).
quarkus.virtual-threads.enabled=true

# --- Edge security baseline (RFC 9700 §2) ------------------------------------
# CORS: deny by default. cors=true activates the policy; with an empty origins list no
# cross-origin request is allowed. Allow specific origins per deployment via
# TESSERA_CORS_ORIGINS (comma-separated); methods/headers are scoped conservatively.
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${TESSERA_CORS_ORIGINS:}
quarkus.http.cors.methods=GET,POST,OPTIONS
quarkus.http.cors.headers=authorization,content-type,dpop

# Security response headers — declarative (vertx-http), applied to every response. The
# server is a JSON protocol + discovery/JWKS surface, never an interactive UI, so the CSP
# forbids loading or framing anything. Cache-Control is intentionally not set here:
# discovery/JWKS keep their cacheable max-age and token responses set their own no-store.
quarkus.http.header."X-Content-Type-Options".value=nosniff
quarkus.http.header."X-Frame-Options".value=DENY
quarkus.http.header."Referrer-Policy".value=no-referrer
quarkus.http.header."Content-Security-Policy".value=default-src 'none'; frame-ancestors 'none'; base-uri 'none'; form-action 'none'
# HSTS only outside dev/test (served over TLS); emitting it over plain-HTTP dev would pin
# the browser to https://localhost.
%prod.quarkus.http.header."Strict-Transport-Security".value=max-age=31536000; includeSubDomains

# HTTP→HTTPS redirect outside dev/test; honour X-Forwarded-* so a TLS-terminating proxy's
# real scheme is respected (no redirect loop when TLS terminates at the edge).
%prod.quarkus.http.insecure-requests=redirect
%prod.quarkus.http.proxy.proxy-address-forwarding=true
# Defence-in-depth (deployment invariant): the gateway is the SOLE ingress. In production,
# pin the trusted forwarding hop so X-Forwarded-* is honoured only from the gateway and
# cannot be spoofed by anything else that reaches the HTTP port directly. Set the gateway
# address/CIDR (e.g. export TESSERA_TRUSTED_PROXIES=10.0.0.0/8) and activate by uncommenting.
# Left unset here on purpose: an empty value would make Quarkus distrust the gateway's
# X-Forwarded-Proto and defeat the %prod HTTPS redirect above.
# %prod.quarkus.http.proxy.trusted-proxies=${TESSERA_TRUSTED_PROXIES}

# Observability. Health probes at /q/health (aggregate), /q/health/ready and
# /q/health/live. Micrometer exposes Prometheus metrics at /q/metrics.
quarkus.micrometer.export.prometheus.path=/q/metrics
quarkus.micrometer.binder.http-server.enabled=true
quarkus.micrometer.binder.jvm=true

# --- Persistence -------------------------------------------------
# PostgreSQL via Hibernate Reactive at runtime; Flyway (over JDBC) owns the schema
# and the row-level-security policies. Hibernate does not generate the schema.
quarkus.datasource.db-kind=postgresql
quarkus.hibernate-orm.database.generation=none
quarkus.flyway.migrate-at-start=true

# Dev Services: opt-in only.
#   %dev  — Dev Services spins up a throwaway Postgres for `quarkus dev`, and the
#           dev-seed Flyway location seeds the fixed dev tenant's ACTIVE signing key
#           so /q/health/ready is UP. (Dev Services runs as a single superuser, so
#           V1's guarded GRANT simply no-ops; RLS isolation is still proven by the IT
#           under the three-role Testcontainers model.)
#   %test — Docker-free: the existing @QuarkusTests boot with NO datasource and the
#           in-memory Item adapter, so Dev Services is OFF and the signing-key
#           readiness check is disabled (it has no reactive datasource to query).
%dev.quarkus.datasource.devservices.enabled=true
%dev.quarkus.flyway.locations=db/migration,db/dev-seed

%test.quarkus.devservices.enabled=false
%test.quarkus.datasource.devservices.enabled=false
# Under %test there is NO datasource: deactivate the datasource and the persistence
# extensions that would otherwise eagerly boot (and fail) against it, so the existing
# Docker-free launcher @QuarkusTests (ItemApiTest, HealthAndMetricsTest,
# HexagonalArchitectureTest) keep booting on the in-memory Item adapter alone. The
# real datasource is exercised by the Testcontainers ITs in iam-persistence.
%test.quarkus.datasource.active=false
%test.quarkus.hibernate-orm.active=false
%test.quarkus.flyway.active=false
%test.quarkus.flyway.migrate-at-start=false

# Signing-key readiness gate: on by default; OFF under %test where
# there is no datasource. See SigningKeyReadinessCheck for the rationale.
iam.readiness.signing-key.enabled=true
%test.iam.readiness.signing-key.enabled=false

# --- Rate limiting / brute-force lockout (RFC 9700 §2) -----------------------
# Ingress throttling on /token and /authorize plus a per-(tenant, client_id) lockout on the
# credential path. Single-node in-memory buckets today (per-node limits); a fleet-wide limiter
# rides on a shared-cache backend. Tune per deployment via TESSERA_RATELIMIT_* env vars.
iam.ratelimit.enabled=${TESSERA_RATELIMIT_ENABLED:true}
iam.ratelimit.max-tracked-keys=${TESSERA_RATELIMIT_MAX_KEYS:100000}
iam.ratelimit.token-capacity=${TESSERA_RATELIMIT_TOKEN_CAPACITY:20}
iam.ratelimit.token-refill-per-minute=${TESSERA_RATELIMIT_TOKEN_REFILL:20}
iam.ratelimit.authorize-capacity=${TESSERA_RATELIMIT_AUTHORIZE_CAPACITY:60}
iam.ratelimit.authorize-refill-per-minute=${TESSERA_RATELIMIT_AUTHORIZE_REFILL:60}
iam.ratelimit.credential-max-failures=${TESSERA_RATELIMIT_CREDENTIAL_MAX_FAILURES:10}
iam.ratelimit.credential-lockout=${TESSERA_RATELIMIT_CREDENTIAL_LOCKOUT:PT5M}
# Argon2id runs on its own bounded worker pool so a credential flood cannot starve the shared
# Vert.x worker pool; size it well below the ~20-thread default (each hash is ~19 MiB).
iam.argon2.pool-size=${TESSERA_ARGON2_POOL_SIZE:4}
# The launcher @QuarkusTests fire several /authorize and /token requests in a burst; keep the
# limiter OFF under %test so they never trip it. Dedicated limiter tests opt in via @TestProfile.
%test.iam.ratelimit.enabled=false

# --- OIDC discovery + JWKS ---------------------------------------------------
# The issuer is SERVER CONFIG per resolved realm — never derived from the Host header.
# Baseline tier: one configured issuer serves every realm; per-tenant issuers are a
# later tier. The configured value is used verbatim as the OIDC `iss`.
iam.oidc.issuer=http://localhost:8080
%test.iam.oidc.issuer=https://issuer.test.example

# Publish-before-sign cache safety margin: the JWKS Cache-Control max-age MUST be
# strictly less than the PENDING dwell (how long a key stays PENDING before it signs),
# so a verifier's cache expires and it re-fetches — picking up the PENDING key — before
# that key is promoted to ACTIVE and signs.
iam.oidc.jwks.cache-ttl-seconds=30
iam.oidc.pending-dwell-seconds=120

# --- Audit log ---------------------------------------------------------------
# Per-tenant tamper-evident hash chain with periodically signed checkpoints.
# The checkpoint signer's key identifier (surfaced as the checkpoint keyId so a
# verifier can select the matching public key).
iam.audit.checkpoint.key-id=audit-checkpoint-ed25519
# Interval at which every tenant's chain head is re-signed into a checkpoint.
# A Quarkus duration expression; set to "disabled" to turn the trigger off.
iam.audit.checkpoint.interval=1h
# The launcher @QuarkusTests drive checkpoints explicitly; keep the periodic
# trigger off under %test so it never fires mid-assertion.
%test.iam.audit.checkpoint.interval=disabled
